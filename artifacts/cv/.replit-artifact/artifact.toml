kind = "web"
previewPath = "/"
title = "Khuzaima Asif — CV"
version = "1.0.0"
id = "artifacts/cv"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18479

[services.development]
run = "pnpm --filter @workspace/cv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cv", "run", "build" ]
publicDir = "artifacts/cv/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18479"
BASE_PATH = "/"
